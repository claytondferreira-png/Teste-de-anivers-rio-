<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Convite</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f6a5b6;
font-family:Arial;
overflow:hidden;
}

/* convite */

.invite{
text-align:center;
}

button{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:30px;
background:#c2185b;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* bolo */

.cakeScene{
display:none;
text-align:center;
}

.cake{
position:relative;
}

/* camadas */

.layer{
width:180px;
height:30px;
background:#8b4513;
margin:6px auto;
border-radius:6px;
opacity:0;
transform:translateY(-100px);
}

/* cobertura */

.icing{
width:0;
height:22px;
background:white;
border-radius:12px;
margin:auto;
position:relative;
}

/* gotas */

.drip{
position:absolute;
width:18px;
height:0;
background:white;
top:20px;
border-radius:10px;
}

.drip1{left:30px}
.drip2{left:80px}
.drip3{left:130px}

/* vela */

.candle{
width:12px;
height:45px;
background:white;
margin:auto;
position:relative;
opacity:0;
}

.flame{
width:16px;
height:20px;
background:gold;
border-radius:50%;
position:absolute;
top:-20px;
left:-2px;
animation:flame 0.8s infinite alternate;
}

@keyframes flame{
from{transform:scale(1)}
to{transform:scale(1.2)}
}

/* texto */

h1{
color:#c2185b;
margin-top:30px;
font-size:34px;
}

/* animações */

.showLayer{
animation:drop 0.7s forwards;
}

@keyframes drop{
to{
opacity:1;
transform:translateY(0);
}
}

.showIcing{
animation:spread 1s forwards;
}

@keyframes spread{
from{width:0}
to{width:180px}
}

.showDrip{
animation:drip 0.8s forwards;
}

@keyframes drip{
from{height:0}
to{height:30px}
}

.showCandle{
animation:fade 0.5s forwards;
}

@keyframes fade{
to{opacity:1}
}

</style>
</head>

<body>

<!-- convite -->

<div class="invite" id="invite">
<h1>💌 Você recebeu um convite</h1>
<br>
<button onclick="abrir()">Abrir</button>
</div>

<!-- bolo -->

<div class="cakeScene" id="cakeScene">

<div class="cake">

<div class="candle" id="candle">
<div class="flame"></div>
</div>

<div class="icing" id="icing">
<div class="drip drip1" id="drip1"></div>
<div class="drip drip2" id="drip2"></div>
<div class="drip drip3" id="drip3"></div>
</div>

<div class="layer" id="layer3"></div>
<div class="layer" id="layer2"></div>
<div class="layer" id="layer1"></div>

<h1>Happy Birthday My Love 🎂</h1>

</div>

</div>

<script>

function abrir(){

document.getElementById("invite").style.display="none"
document.getElementById("cakeScene").style.display="block"

/* camadas */

setTimeout(()=>layer1.classList.add("showLayer"),400)
setTimeout(()=>layer2.classList.add("showLayer"),800)
setTimeout(()=>layer3.classList.add("showLayer"),1200)

/* cobertura */

setTimeout(()=>icing.classList.add("showIcing"),1700)

/* gotas */

setTimeout(()=>{
drip1.classList.add("showDrip")
drip2.classList.add("showDrip")
drip3.classList.add("showDrip")
},2200)

/* vela */

setTimeout(()=>candle.classList.add("showCandle"),2700)

}

</script>

</body>
</html>
