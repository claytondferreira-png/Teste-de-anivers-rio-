<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Birthday Animation</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#f6a5b6;
  font-family:Arial;
}

/* container */
.scene{
  text-align:center;
}

/* bolo */
.cake{
  position:relative;
  margin:auto;
}

/* camadas */
.layer{
  width:160px;
  height:30px;
  background:#8b4513;
  margin:4px auto;
  border-radius:6px;
  opacity:0;
  transform:translateY(-80px);
}

/* cobertura */
.icing{
  width:160px;
  height:18px;
  background:white;
  border-radius:10px;
  position:relative;
  margin:auto;
  opacity:0;
  overflow:visible;
}

/* gotas */
.drip{
  position:absolute;
  width:20px;
  height:25px;
  background:white;
  border-radius:50%;
  top:10px;
  animation:dripMove 2s infinite ease-in-out;
}

.drip:nth-child(1){ left:20px; animation-delay:0s; }
.drip:nth-child(2){ left:60px; animation-delay:0.4s; }
.drip:nth-child(3){ left:100px; animation-delay:0.8s; }

@keyframes dripMove{
  0%{ transform:translateY(-10px) scaleY(0.5); }
  50%{ transform:translateY(10px) scaleY(1.2); }
  100%{ transform:translateY(-10px) scaleY(0.5); }
}

/* vela */
.candle{
  width:10px;
  height:40px;
  background:white;
  margin:auto;
  position:relative;
  opacity:0;
}

.flame{
  width:14px;
  height:18px;
  background:gold;
  border-radius:50%;
  position:absolute;
  top:-18px;
  left:-2px;
  animation:flame 0.8s infinite alternate;
}

@keyframes flame{
  from{ transform:scale(1); }
  to{ transform:scale(1.2); }
}

/* texto */
h1{
  color:#c2185b;
  margin-top:30px;
  font-size:32px;
}

/* animações */

.showLayer{
  animation:drop 0.7s forwards;
}

.showIcing{
  animation:icingDrop 0.7s forwards;
}

.showCandle{
  animation:fade 0.5s forwards;
}

@keyframes drop{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes icingDrop{
  from{
    transform:scaleX(0.2);
    opacity:0;
  }
  to{
    transform:scaleX(1);
    opacity:1;
  }
}

@keyframes fade{
  to{ opacity:1; }
}

</style>
</head>

<body>

<div class="scene">

<div class="cake">

<div class="candle" id="candle">
<div class="flame"></div>
</div>

<div class="icing" id="icing">
<div class="drip"></div>
<div class="drip"></div>
<div class="drip"></div>
</div>

<div class="layer" id="layer3"></div>
<div class="layer" id="layer2"></div>
<div class="layer" id="layer1"></div>

</div>

<h1>Happy Birthday My Love</h1>

</div>

<script>

/* camadas */

setTimeout(()=>layer1.classList.add("showLayer"),500)
setTimeout(()=>layer2.classList.add("showLayer"),900)
setTimeout(()=>layer3.classList.add("showLayer"),1300)

/* cobertura */

setTimeout(()=>icing.classList.add("showIcing"),1800)

/* vela */

setTimeout(()=>candle.classList.add("showCandle"),2300)

</script>

</body>
</html>
